[unix_http_server]
file=/lumo_lab/state/supervisor.sock
chmod=0700
chown=lumolab:lumolab

[supervisord]
nodaemon=true
user=lumolab
logfile=/lumo_lab/logs/supervisord.log
pidfile=/lumo_lab/state/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///lumo_lab/state/supervisor.sock

[program:bootstrap]
command=/bin/sh /opt/lumo-lab/scripts/bootstrap.sh
autostart=true
autorestart=false
startsecs=0
priority=1
stdout_logfile=/lumo_lab/logs/bootstrap.log
stderr_logfile=/lumo_lab/logs/bootstrap.err.log

[program:api]
command=/usr/local/bin/lumo-lab --mode server
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/api.log
stderr_logfile=/lumo_lab/logs/api.err.log

[program:daemon]
command=/usr/local/bin/lumo-lab --mode daemon
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/daemon.log
stderr_logfile=/lumo_lab/logs/daemon.err.log

[program:ollama]
command=/bin/bash -c "set -o pipefail; /bin/sh /opt/lumo-lab/scripts/start-ollama.sh 2>&1 | perl -MPOSIX=strftime -ne 'BEGIN { $| = 1 } print strftime(\"[%%Y-%%m-%%d %%H:%%M:%%S]\", localtime) . \" \" . $_;'"
environment=HOME="/home/lumolab",OLLAMA_MODELS="/lumo_lab/state/ollama/models"
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/lumo.log
stderr_logfile=/lumo_lab/logs/lumo.err.log

[program:ollama-model]
command=/bin/sh /opt/lumo-lab/scripts/pull-ollama-model.sh
environment=HOME="/home/lumolab",OLLAMA_MODELS="/lumo_lab/state/ollama/models",OLLAMA_BASE_URL="http://127.0.0.1:11434",OLLAMA_MODEL="qwen3:1.7b"
autostart=true
autorestart=false
startsecs=0
priority=11
stdout_logfile=/lumo_lab/logs/lumo.log
stderr_logfile=/lumo_lab/logs/lumo.err.log
