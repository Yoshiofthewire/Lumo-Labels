[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700
chown=lumolab:lumolab

[supervisord]
nodaemon=true
user=lumolab
logfile=/lumo_lab/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:bootstrap]
command=/bin/sh /opt/lumo-lab/scripts/bootstrap.sh
autostart=true
autorestart=false
startsecs=0
priority=1
stdout_logfile=/lumo_lab/logs/bootstrap.log
stderr_logfile=/lumo_lab/logs/bootstrap.err.log

[program:api]
command=/usr/local/bin/lumo-lab --mode server
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/api.log
stderr_logfile=/lumo_lab/logs/api.err.log

[program:daemon]
command=/usr/local/bin/lumo-lab --mode daemon
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/daemon.log
stderr_logfile=/lumo_lab/logs/daemon.err.log

[program:lumo]
command=/bin/bash -lc "set -o pipefail; /bin/sh /opt/lumo-lab/scripts/start-lumo.sh 2>&1 | perl -MPOSIX=strftime -ne 'BEGIN { $| = 1 } print strftime(\"[%%Y-%%m-%%d %%H:%%M:%%S]\", localtime) . \" \" . $_;'"
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/lumo_lab/logs/lumo.log
stderr_logfile=/lumo_lab/logs/lumo.err.log
